# This file defines request-shaping defaults for each model.
# OpenAI-style params stay at the request top level.
# Provider-native params always go through extra_body.

[global]
non_overridable_openai_params = [
  "model",
  "messages",
  "stream",
  "api_key",
  "base_url",
  "extra_body",
]
non_overridable_provider_params = [
  "allowed_openai_params",
  "extra_body",
]

[default]
openai_defaults = {}
provider_defaults = {}
extra_body = {}
litellm_allowed_openai_passthrough = [
  "parallel_tool_calls",
  "reasoning_effort",
  "response_format",
]

[models."doubao-seed-2-0-mini-260215"]
openai_defaults = {}
provider_defaults = {}
extra_body = {}
litellm_allowed_openai_passthrough = []

[models."doubao-seed-2-0-pro-260215"]
openai_defaults = {}
provider_defaults = {}
extra_body = {}
litellm_allowed_openai_passthrough = []
